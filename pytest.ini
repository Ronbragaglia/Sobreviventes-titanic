[pytest]
# Configurações do pytest

# Diretórios de teste
testpaths = tests

# Padrões de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de execução
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Marcadores
markers =
    slow: marca testes lentos
    integration: marca testes de integração
    unit: marca testes unitários

# Cobertura de código
# Para usar, execute: pytest --cov=src --cov-report=html
